<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Rhythm Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    #game {
      position: relative;
      width: 300px;
      height: 500px;
      margin: 20px auto;
      background: #222;
      border: 2px solid #555;
      overflow: hidden;
    }

    .note {
      position: absolute;
      width: 60px;
      height: 20px;
      background: cyan;
      left: 120px;
      border-radius: 5px;
    }

    #hit-line {
      position: absolute;
      bottom: 50px;
      width: 100%;
      height: 5px;
      background: red;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>簡単音ゲー</h1>
  <p>タイミングよくタップ or スペースキー！</p>
  <div id="game">
    <div id="hit-line"></div>
  </div>
  <button onclick="startGame()">スタート</button>
  <p id="score">スコア: 0</p>

  <script>
    const game = document.getElementById("game");
    const scoreDisplay = document.getElementById("score");
    let score = 0;
    let notes = [];
    let gameInterval;

    function createNote() {
      const note = document.createElement("div");
      note.classList.add("note");
      note.style.top = "0px";
      game.appendChild(note);
      notes.push(note);
    }

    function moveNotes() {
      notes.forEach((note, index) => {
        let top = parseInt(note.style.top);
        note.style.top = top + 5 + "px";

        if (top > 500) {
          note.remove();
          notes.splice(index, 1);
        }
      });
    }

    function hitNote() {
      notes.forEach((note, index) => {
        let top = parseInt(note.style.top);
        if (top > 420 && top < 480) {
          score++;
          scoreDisplay.textContent = "スコア: " + score;
          note.remove();
          notes.splice(index, 1);
        }
      });
    }

    function startGame() {
      score = 0;
      scoreDisplay.textContent = "スコア: 0";
      notes.forEach(n => n.remove());
      notes = [];

      clearInterval(gameInterval);

      setInterval(createNote, 1000);
      gameInterval = setInterval(() => {
        moveNotes();
      }, 50);
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        hitNote();
      }
    });

    game.addEventListener("click", hitNote);
  </script>
</body>
</html>
