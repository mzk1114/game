<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歴史単語ゲーム（強化版）</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f4f8;
  text-align: center;
  margin: 0;
}

h1 {
  background: #2c3e50;
  color: white;
  padding: 15px;
  margin: 0;
}

#game {
  margin-top: 40px;
}

#question {
  font-size: 20px;
  margin-bottom: 20px;
}

button.choice {
  display: block;
  width: 80%;
  max-width: 300px;
  margin: 10px auto;
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
}

#result {
  font-size: 40px;
  margin: 20px;
  height: 50px;
}

.correct { color: green; }
.wrong { color: red; }

#score {
  margin-top: 20px;
  font-size: 18px;
}

#startBtn {
  margin-top: 30px;
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: #27ae60;
  color: white;
}
</style>
</head>
<body>

<h1>📚 高1 歴史単語ゲーム（強化版）</h1>

<div id="game">
  <div id="question">スタートを押してね！</div>
  <div id="choices"></div>
  <div id="result"></div>
  <button id="startBtn" onclick="startGame()">スタート</button>
  <div id="score">スコア: 0</div>
</div>

<!-- 効果音 -->
<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4017c1a5a4.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c2c7e9b4b5.mp3"></audio>

<script>
const questions = [
  { q: "墾田永年私財法の目的は？", choices: ["開墾促進","税軽減","仏教普及","貴族抑制"], answer: "開墾促進" },
  { q: "院政を始めた人物は？", choices: ["白河上皇","後白河","鳥羽","後三条"], answer: "白河上皇" },
  { q: "守護の役割は？", choices: ["軍事警察","税徴収","外交","裁判のみ"], answer: "軍事警察" },
  { q: "参勤交代の目的は？", choices: ["大名統制","経済発展","外交","農業"], answer: "大名統制" }
];

let current = 0;
let score = 0;

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

function startGame() {
  current = 0;
  score = 0;
  document.getElementById("score").textContent = "スコア: 0";
  document.getElementById("result").textContent = "";
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById("question").textContent = q.q;

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  q.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.className = "choice";
    btn.onclick = () => checkAnswer(choice);
    choicesDiv.appendChild(btn);
  });
}

function checkAnswer(choice) {
  const resultDiv = document.getElementById("result");

  if (choice === questions[current].answer) {
    score++;
    resultDiv.textContent = "⭕";
    resultDiv.className = "correct";
    correctSound.play();
  } else {
    resultDiv.textContent = "❌";
    resultDiv.className = "wrong";
    wrongSound.play();
  }

  document.getElementById("score").textContent = "スコア: " + score;

  current++;

  if (current < questions.length) {
    setTimeout(showQuestion, 800);
  } else {
    setTimeout(() => {
      document.getElementById("question").textContent = "終了！";
      document.getElementById("choices").innerHTML = "";
    }, 800);
  }
}
</script>

</body>
</html>
