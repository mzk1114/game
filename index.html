<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歴史単語ゲーム</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f4f8;
  text-align: center;
  margin: 0;
}

h1 {
  background: #2c3e50;
  color: white;
  padding: 15px;
  margin: 0;
}

#game {
  margin-top: 40px;
}

#question {
  font-size: 20px;
  margin-bottom: 20px;
}

button.choice {
  display: block;
  width: 80%;
  max-width: 300px;
  margin: 10px auto;
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
}

button.choice:hover {
  background: #2980b9;
}

#score {
  margin-top: 20px;
  font-size: 18px;
}

#startBtn {
  margin-top: 30px;
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: #27ae60;
  color: white;
}
</style>
</head>
<body>

<h1>📚 高1 歴史単語ゲーム</h1>

<div id="game">
  <div id="question">スタートを押してね！</div>
  <div id="choices"></div>
  <button id="startBtn" onclick="startGame()">スタート</button>
  <div id="score">スコア: 0</div>
</div>

<script>
const questions = [
  {
    q: "鎌倉幕府を開いた人物は？",
    choices: ["源頼朝", "織田信長", "徳川家康", "足利尊氏"],
    answer: "源頼朝"
  },
  {
    q: "大化の改新が始まった年は？",
    choices: ["645年", "710年", "794年", "1192年"],
    answer: "645年"
  },
  {
    q: "江戸幕府を開いたのは？",
    choices: ["徳川家康", "豊臣秀吉", "源義経", "足利義満"],
    answer: "徳川家康"
  },
  {
    q: "平安京に都を移した天皇は？",
    choices: ["桓武天皇", "聖武天皇", "天武天皇", "後醍醐天皇"],
    answer: "桓武天皇"
  }
];

let current = 0;
let score = 0;

function startGame() {
  current = 0;
  score = 0;
  document.getElementById("score").textContent = "スコア: 0";
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById("question").textContent = q.q;

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  q.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.className = "choice";
    btn.onclick = () => checkAnswer(choice);
    choicesDiv.appendChild(btn);
  });
}

function checkAnswer(choice) {
  if (choice === questions[current].answer) {
    score++;
  }

  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    document.getElementById("question").textContent = "終了！";
    document.getElementById("choices").innerHTML = "";
  }

  document.getElementById("score").textContent = "スコア: " + score;
}
</script>

</body>
</html>
