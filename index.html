<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>歴史単語ゲーム（強化版）</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f0f4f8;
  text-align: center;
  margin: 0;
}

h1 {
  background: #2c3e50;
  color: white;
  padding: 15px;
  margin: 0;
}

#game {
  margin-top: 40px;
}

#question {
  font-size: 20px;
  margin-bottom: 20px;
}

button.choice {
  display: block;
  width: 80%;
  max-width: 300px;
  margin: 10px auto;
  padding: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
}

#result {
  font-size: 40px;
  margin: 20px;
  height: 50px;
}

.correct { color: green; }
.wrong { color: red; }

#score {
  margin-top: 20px;
  font-size: 18px;
}

#startBtn {
  margin-top: 30px;
  padding: 10px 20px;
  font-size: 18px;
  border: none;
  border-radius: 8px;
  background: #27ae60;
  color: white;
}
</style>
</head>
<body>

<h1>📚 高1 歴史単語ゲーム（強化版）</h1>

<div id="game">
  <div id="question">スタートを押してね！</div>
  <div id="choices"></div>
  <div id="result"></div>
  <button id="startBtn" onclick="startGame()">スタート</button>
  <div id="score">スコア: 0</div>
</div>

<!-- 効果音 -->
<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4017c1a5a4.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c2c7e9b4b5.mp3"></audio>

<script>
const questions = [
  { q: "版籍奉還が行われた年は？", choices: ["1869年","1871年","1889年","1868年"], answer: "1869年" },
  { q: "廃藩置県の目的として最も適切なのは？", choices: ["中央集権化","殖産興業","富国強兵","地租改正"], answer: "中央集権化" },
  { q: "地租改正の内容として正しいのは？", choices: ["現金納税","年貢廃止のみ","米で納税","税率毎年変動"], answer: "現金納税" },
  { q: "大日本帝国憲法が発布された年は？", choices: ["1889年","1890年","1877年","1900年"], answer: "1889年" },
  { q: "日清戦争の講和条約は？", choices: ["下関条約","ポーツマス条約","日米修好通商条約","ベルサイユ条約"], answer: "下関条約" },
  { q: "第一次世界大戦中に日本が中国に出した要求は？", choices: ["二十一か条の要求","ワシントン体制","満州事変","治外法権"], answer: "二十一か条の要求" },
  { q: "満州事変が起きた年は？", choices: ["1931年","1937年","1929年","1941年"], answer: "1931年" },
  { q: "日本が第二次世界大戦に本格参戦するきっかけは？", choices: ["真珠湾攻撃","日独伊三国同盟","満州事変","五・一五事件"], answer: "真珠湾攻撃" }
];

let current = 0;
let score = 0;

const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");

function startGame() {
  current = 0;
  score = 0;
  document.getElementById("score").textContent = "スコア: 0";
  document.getElementById("result").textContent = "";
  showQuestion();
}

function showQuestion() {
  const q = questions[current];
  document.getElementById("question").textContent = q.q;

  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  q.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.className = "choice";
    btn.onclick = () => checkAnswer(choice);
    choicesDiv.appendChild(btn);
  });
}

function checkAnswer(choice) {
  const resultDiv = document.getElementById("result");
  const correctAnswer = questions[current].answer;

  if (choice === correctAnswer) {
    score++;
    resultDiv.textContent = "⭕ 正解！";
    resultDiv.className = "correct";
    correctSound.play();
  } else {
    resultDiv.textContent = "❌ 不正解（正解：" + correctAnswer + "）";
    resultDiv.className = "wrong";
    wrongSound.play();
  }

  document.getElementById("score").textContent = "スコア: " + score;

  current++;

  if (current < questions.length) {
    setTimeout(showQuestion, 1200);
  } else {
    setTimeout(() => {
      document.getElementById("question").textContent = "終了！";
      document.getElementById("choices").innerHTML = "";
    }, 1200);
  }
} else {
    resultDiv.textContent = "❌";
    resultDiv.className = "wrong";
    wrongSound.play();
  }

  document.getElementById("score").textContent = "スコア: " + score;

  current++;

  if (current < questions.length) {
    setTimeout(showQuestion, 800);
  } else {
    setTimeout(() => {
      document.getElementById("question").textContent = "終了！";
      document.getElementById("choices").innerHTML = "";
    }, 800);
  }
}
</script>

</body>
</html>
